# -------------------------------------------------------------------------------
# GoReleaser Configuration - Release Automation
#
# Project: Buckham Duffy
#
# Builds multi-arch binaries, Debian packages, Docker images, and GitHub Releases.
# Triggered by version tag pushes (v*) via GitHub Actions.
# -------------------------------------------------------------------------------

version: 2

builds:
  - id: cloudflare-log-collector
    main: ./cmd/cloudflare-log-collector
    binary: cloudflare-log-collector
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/buckhamduffy/cloudflare-log-collector/internal/telemetry.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - id: deb
    package_name: cloudflare-log-collector
    vendor: Buckham Duffy
    homepage: https://github.com/buckhamduffy/cloudflare-log-collector
    maintainer: Buckham Duffy <hello@buckhamduffy.com>
    description: |
      Cloudflare analytics collector for self-hosted observability stacks.
      Polls the GraphQL API for firewall events and HTTP traffic stats,
      ships them to Loki and Prometheus with OpenTelemetry tracing.
    section: admin
    priority: optional
    formats:
      - deb
    dependencies:
      - systemd
    contents:
      - src: ./packaging/cloudflare-log-collector.service
        dst: /usr/lib/systemd/system/cloudflare-log-collector.service
        file_info:
          mode: 0644

      - dst: /etc/cloudflare-log-collector
        type: dir
        file_info:
          mode: 0750

      - src: ./packaging/config.example.yaml
        dst: /etc/cloudflare-log-collector/config.example.yaml
        type: config
        file_info:
          mode: 0640

      - src: ./packaging/copyright
        dst: /usr/share/doc/cloudflare-log-collector/copyright
        file_info:
          mode: 0644

      - src: ./packaging/changelog.gz
        dst: /usr/share/doc/cloudflare-log-collector/changelog.Debian.gz
        file_info:
          mode: 0644

    scripts:
      postinstall: ./packaging/postinst
      preremove: ./packaging/prerm
      postremove: ./packaging/postrm

dockers:
  - ids:
      - cloudflare-log-collector
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:{{ .Tag }}-amd64"
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/buckhamduffy/cloudflare-log-collector"
      - "--build-arg=VERSION={{.Version}}"
    use: buildx

  - ids:
      - cloudflare-log-collector
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:{{ .Tag }}-arm64"
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source=https://github.com/buckhamduffy/cloudflare-log-collector"
      - "--build-arg=VERSION={{.Version}}"
    use: buildx

docker_manifests:
  - name_template: "ghcr.io/buckhamduffy/cloudflare-log-collector:{{ .Tag }}"
    image_templates:
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:{{ .Tag }}-amd64"
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/buckhamduffy/cloudflare-log-collector:latest"
    image_templates:
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:latest-amd64"
      - "ghcr.io/buckhamduffy/cloudflare-log-collector:latest-arm64"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: buckhamduffy
    name: cloudflare-log-collector
