# -------------------------------------------------------------------------------
# CI Workflow - GitHub Actions
#
# Author: Alex Freidah
#
# Runs on push to main and pull requests. A path-detection job determines which
# file categories changed and downstream jobs use those outputs to skip
# irrelevant work. On push to main, Docker image builds run for the categories
# that changed.
# -------------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # PATH DETECTION
  # ---------------------------------------------------------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - '.golangci.yml'

  # ---------------------------------------------------------------------------
  # GO CHECKS
  # ---------------------------------------------------------------------------
  version-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Go changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '\.go$'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify version bump
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:.version)
          PR_VERSION=$(cat .version)
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::error::.version must be incremented when Go files change (current: $PR_VERSION)"
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION → $PR_VERSION"

  lint:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  test:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ---------------------------------------------------------------------------
  # DOCKER IMAGES (push to main only)
  # ---------------------------------------------------------------------------
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    needs: [changes, lint, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Read version
        id: version
        run: echo "version=$(cat .version)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          pull: true
          push: true
          build-args: VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/afreidah/cloudflare-log-collector:${{ steps.version.outputs.version }}
            ghcr.io/afreidah/cloudflare-log-collector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy image --exit-code 1 --severity CRITICAL,HIGH ghcr.io/afreidah/cloudflare-log-collector:${{ steps.version.outputs.version }}
